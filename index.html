<title>Mayank's Grind Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
html,body{overscroll-behavior:none}
body{
  background:linear-gradient(145deg,#0B0E11,#131820 50%,#0F1318);
  color:#E8ECF1;
  font-family:'DM Sans','Segoe UI',sans-serif;
  min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) 16px 90px;
  user-select:none;-webkit-user-select:none;
}
.install-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:linear-gradient(135deg,#1a2233,#131820);
  border-top:1px solid #44BBA430;
  padding:14px 20px;display:flex;align-items:center;gap:12px;
  animation:slideUp .4s ease;
}
.install-banner.hidden{display:none}
.install-btn{
  flex-shrink:0;padding:10px 20px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#44BBA4,#3aa392);color:#0B0E11;
  font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.install-dismiss{background:none;border:none;color:#7B8794;font-size:20px;cursor:pointer;padding:4px 8px}
.install-text{flex:1;font-size:13px;color:#E8ECF1;line-height:1.3}
.install-text small{color:#7B8794;display:block;margin-top:2px;font-size:11px}

.header{text-align:center;padding:20px 0 18px}
.header-tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:#44BBA4;text-transform:uppercase;margin-bottom:6px}
.header h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#E8ECF1,#7B8794);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:12px;color:#7B8794;margin-top:4px}

.day-bar{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto;padding:0 2px 4px}
.day-btn{flex:1;min-width:44px;padding:10px 4px;border-radius:10px;border:1px solid #1E2530;background:#131820;color:#7B8794;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;text-align:center}
.day-btn.active{border:1.5px solid #44BBA4;background:linear-gradient(135deg,rgba(68,187,164,.09),rgba(68,187,164,.03));color:#44BBA4;font-weight:700}
.day-btn.sunday{color:#E84855}
.day-btn.active.sunday{color:#44BBA4}
.day-btn .rest-tag{font-size:8px;margin-top:2px;opacity:.7}
.day-btn.today-dot::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:#44BBA4;margin:3px auto 0}

.gym-badge{border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.gym-badge.active{background:linear-gradient(135deg,rgba(232,72,85,.09),rgba(232,72,85,.03));border:1px solid rgba(232,72,85,.19)}
.gym-badge.rest{background:linear-gradient(135deg,rgba(92,77,125,.09),rgba(92,77,125,.03));border:1px solid rgba(92,77,125,.19)}
.gym-badge .icon{font-size:18px}
.gym-badge .label{font-size:11px;color:#7B8794;font-weight:500}
.gym-badge .value{font-size:14px;font-weight:600}
.gym-badge .value.on{color:#E84855}
.gym-badge .value.off{color:#5C4D7D}

.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #1E2530;background:transparent;color:#7B8794;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn.on{border-color:var(--fc);color:var(--fc);background:var(--fbg)}

.timeline{position:relative;padding-left:18px}
.timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,rgba(68,187,164,.19),#1E2530,rgba(92,77,125,.19));border-radius:2px}
.task-row{position:relative;margin-bottom:6px;padding-left:20px;animation:fadeSlide .3s ease both}
.task-row .dot{position:absolute;left:-1px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid #131820}
.task-card{border-radius:12px;padding:10px 14px;transition:all .2s}
.task-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.task-card .time{font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.task-card .dur{font-size:10px;color:#7B8794;background:#1E2530;padding:2px 8px;border-radius:10px}
.task-card .desc{font-size:13px;font-weight:500;color:#E8ECF1;line-height:1.4}

.current-indicator{border:1.5px solid #44BBA4 !important;box-shadow:0 0 12px rgba(68,187,164,.15)}
.current-label{font-size:9px;color:#44BBA4;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-left:auto;padding:1px 6px;background:rgba(68,187,164,.12);border-radius:6px}

.summary{margin-top:28px;background:linear-gradient(135deg,rgba(30,37,48,.1),rgba(19,24,32,.5));border:1px solid #1E2530;border-radius:14px;padding:16px}
.summary-tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:#44BBA4;text-transform:uppercase;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{border-radius:10px;padding:8px 12px}
.stat-card .s-icon{font-size:14px}
.stat-card .s-label{font-size:11px;font-weight:600}
.stat-card .s-val{font-size:11px;color:#7B8794;margin-top:2px}

.footer{text-align:center;font-size:11px;color:rgba(123,135,148,.37);margin-top:20px;line-height:1.5}

@keyframes fadeSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
</head>

</div>

<div class="summary" id="summary"></div>
<p class="footer">Built for Mayank • Ambikapur Grind Mode 🔥</p>

</div>

// ===== CURRENT TIME DETECTION =====
function parseTime(tStr){
  const m=tStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m)return 0;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;
  if(m[3].toUpperCase()==='AM'&&h===12)h=0;
  return h*60+min;
}
function getCurrentTaskIdx(tasks){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  let current=-1;
  for(let i=0;i<tasks.length;i++){
    if(parseTime(tasks[i].t)<=nowMin)current=i;
  }
  return current;
}

// ===== STATE =====
let sel=(()=>{const d=new Date().getDay();return d===0?6:d-1;})();
const todayIdx=sel;
let filt=null;

// ===== RENDER =====
function render(){
  const day=DAYS[sel];
  const allTasks=S[day];
  const tasks=filt?allTasks.filter(i=>i.y===filt):allTasks;
  const isToday=sel===todayIdx;
  const currentIdx=isToday?getCurrentTaskIdx(allTasks):-1;

  // Day bar
  let db='';
  DSHORT.forEach((d,i)=>{
    const cls=['day-btn'];
    if(i===sel)cls.push('active');
    if(i===6&&i!==sel)cls.push('sunday');
    if(i===todayIdx)cls.push('today-dot');
    db+=`<button class="${cls.join(' ')}" onclick="sel=${i};filt=null;render()">${d}${i===6?'<div class="rest-tag">REST</div>':''}</button>`;
  });
  document.getElementById('dayBar').innerHTML=db;

  // Gym badge
  const g=GYM[day];
  document.getElementById('gymBadge').innerHTML=`
    <div class="gym-badge ${g?'active':'rest'}">
      <span class="icon">${g?'💪':'😴'}</span>
      <div>
        <div class="label">${day}'s Gym</div>
        <div class="value ${g?'on':'off'}">${g||'Rest Day — Active Recovery Only'}</div>
      </div>
    </div>`;

  // Filters
  let fb=`<button class="filter-btn ${!filt?'on':''}" style="--fc:#44BBA4;--fbg:rgba(68,187,164,.09)" onclick="filt=null;render()">All</button>`;
  Object.entries(TYPE).forEach(([k,v])=>{
    if(k==='sleep')return;
    fb+=`<button class="filter-btn ${filt===k?'on':''}" style="--fc:${v.color};--fbg:${v.bg}" onclick="filt=filt==='${k}'?null:'${k}';render()">${v.icon} ${v.label}</button>`;
  });
  document.getElementById('filters').innerHTML=fb;

  // Timeline
  let tl='';
  tasks.forEach((item,i)=>{
    const c=TYPE[item.y];
    const origIdx=allTasks.indexOf(item);
    const isCurrent=isToday&&origIdx===currentIdx;
    tl+=`
    <div class="task-row" style="animation-delay:${i*30}ms" ${isCurrent?'id="currentTask"':''}>
      <div class="dot" style="background:${c.color};box-shadow:0 0 8px ${c.color}40"></div>
      <div class="task-card ${isCurrent?'current-indicator':''}" style="background:linear-gradient(135deg,${c.bg},#131820);border:1px solid ${c.color}${isCurrent?'40':'15'}">
        <div class="top">
          <span class="time" style="color:${c.color}">${item.t}</span>
          ${isCurrent?'<span class="current-label">NOW</span>':''}
          ${item.d?`<span class="dur">${item.d}</span>`:''}
        </div>
        <div class="desc">${item.k}</div>
      </div>
    </div>`;
  });
  document.getElementById('timeline').innerHTML=tl;

  // Auto-scroll to current
  if(isToday&&!filt){
    setTimeout(()=>{
      const el=document.getElementById('currentTask');
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    },400);
  }

  // Summary
  let sg='';
  STATS.forEach(s=>{
    const c=TYPE[s.y];
    sg+=`<div class="stat-card" style="background:${c.bg};border:1px solid ${c.color}15">
      <div class="s-icon">${c.icon}</div>
      <div class="s-label" style="color:${c.color}">${c.label}</div>
      <div class="s-val">${s.v}</div>
    </div>`;
  });
  document.getElementById('summary').innerHTML=`
    <div class="summary-tag">Weekly Totals</div>
    <div class="summary-grid">${sg}</div>`;
}

render();
// Update current task every minute
setInterval(()=>{if(sel===todayIdx)render();},60000);

// ===== PWA INSTALL =====
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('installBanner').classList.remove('hidden');
});

document.getElementById('installBtn').addEventListener('click',async()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    const r=await deferredPrompt.userChoice;
    deferredPrompt=null;
    document.getElementById('installBanner').classList.add('hidden');
  }
});
document.getElementById('installDismiss').addEventListener('click',()=>{
  document.getElementById('installBanner').classList.add('hidden');
});

window.addEventListener('appinstalled',()=>{
  document.getElementById('installBanner').classList.add('hidden');
  document.getElementById('subhead').textContent='✅ Installed! 9 Channels • 3 Videos/Day • 6 Days Gym';
});

// ===== INLINE SERVICE WORKER =====
const swCode=`
const C='grind-v1';
self.addEventListener('install',e=>{self.skipWaiting()});
self.addEventListener('activate',e=>{self.clients.claim()});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
    const clone=resp.clone();
    caches.open(C).then(c=>c.put(e.request,clone));
    return resp;
  }).catch(()=>caches.match(e.request)))
  );
});`;

const mUrl=URL.createObjectURL(mBlob);
const mLink=document.createElement('link');
mLink.rel='manifest';
mLink.href=mUrl;
document.head.appendChild(mLink);

// Register inline service worker
if('serviceWorker' in navigator){
  const swBlob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl,{scope:location.pathname}).catch(()=>{});
}
