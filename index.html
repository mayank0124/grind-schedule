<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#44BBA4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GrindSchedule">
<title>Mayank's Grind Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080A0E;--surface:#0E1117;--card:#141921;--border:#1C2333;
  --text:#E2E8F0;--muted:#64748B;--accent:#44BBA4;--accent2:#3AA392;
  --red:#EF4444;--blue:#3B82F6;--orange:#F59E0B;--purple:#8B5CF6;--green:#22C55E;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
html,body{overscroll-behavior:none;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) 0 100px;
}

/* === NAV TABS === */
.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,transparent,var(--bg) 20%);
  padding:8px 16px env(safe-area-inset-bottom);
  display:flex;gap:4px;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px;border:none;border-radius:12px;
  background:transparent;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;cursor:pointer;
  transition:all .2s;
}
.nav-btn.active{color:var(--accent);background:rgba(68,187,164,.08)}
.nav-btn svg{width:20px;height:20px}

/* === PAGES === */
.page{display:none;padding:16px}
.page.active{display:block}

/* === HEADER === */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;
}
.top-bar h2{font-size:18px;font-weight:700}
.streak-badge{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.08));
  border:1px solid rgba(245,158,11,.2);
  font-size:12px;font-weight:600;color:var(--orange);
}

/* === DAY SELECTOR === */
.day-scroll{display:flex;gap:6px;padding:12px 16px;overflow-x:auto}
.day-chip{
  position:relative;min-width:52px;padding:8px 6px;
  border:1px solid var(--border);border-radius:12px;
  background:var(--surface);color:var(--muted);
  font-size:11px;font-weight:500;cursor:pointer;
  text-align:center;transition:all .2s;font-family:'Outfit',sans-serif;
}
.day-chip .day-name{font-weight:600;font-size:12px;display:block}
.day-chip .day-date{font-size:10px;opacity:.6;margin-top:1px}
.day-chip.active{border-color:var(--accent);background:rgba(68,187,164,.08);color:var(--accent)}
.day-chip.today::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.day-chip .check-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%}

/* === PROGRESS RING === */
.progress-section{
  display:flex;align-items:center;gap:16px;
  padding:14px 16px;margin:0 16px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
}
.ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-text{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring-pct{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)}
.ring-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.progress-stats{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mini-stat{padding:6px 8px;background:var(--card);border-radius:8px}
.mini-stat .ms-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.mini-stat .ms-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* === GYM BADGE === */
.gym-strip{
  margin:0 16px 12px;padding:10px 14px;border-radius:12px;
  display:flex;align-items:center;gap:10px;
}
.gym-strip.on{background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.03));border:1px solid rgba(239,68,68,.15)}
.gym-strip.off{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(139,92,246,.03));border:1px solid rgba(139,92,246,.15)}
.gym-strip .g-icon{font-size:16px}
.gym-strip .g-text{font-size:13px;font-weight:600}
.gym-strip .g-text.on{color:var(--red)}
.gym-strip .g-text.off{color:var(--purple)}

/* === TASK LIST === */
.task-list{padding:0 16px}
.task-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px;margin-bottom:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  transition:all .3s;cursor:pointer;
  animation:fadeIn .25s ease both;
}
.task-item.done{opacity:.5;background:rgba(34,197,94,.03);border-color:rgba(34,197,94,.12)}
.task-item.done .task-name{text-decoration:line-through;color:var(--muted)}
.task-item.current-task{border-color:rgba(68,187,164,.3);box-shadow:0 0 20px rgba(68,187,164,.08)}

.checkbox{
  width:22px;height:22px;flex-shrink:0;margin-top:1px;
  border:2px solid var(--border);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.task-item.done .checkbox{background:var(--green);border-color:var(--green)}
.checkbox svg{width:12px;height:12px;opacity:0;transition:all .2s}
.task-item.done .checkbox svg{opacity:1}

.task-body{flex:1;min-width:0}
.task-top{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.task-time{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
.task-dur{font-size:9px;color:var(--muted);background:var(--card);padding:1px 6px;border-radius:6px;margin-left:auto}
.now-tag{font-size:8px;color:var(--accent);background:rgba(68,187,164,.12);padding:1px 6px;border-radius:6px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;animation:pulse 2s infinite}
.task-name{font-size:13px;font-weight:500;line-height:1.35;color:var(--text)}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px}

/* === FILTERS === */
.filter-row{display:flex;gap:6px;padding:8px 16px;flex-wrap:wrap;margin-bottom:4px}
.f-pill{
  padding:5px 10px;border-radius:16px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:11px;font-weight:600;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;
}
.f-pill.on{border-color:var(--fc);color:var(--fc);background:var(--fbg)}

/* === STATS PAGE === */
.stats-card{
  margin:0 0 12px;padding:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
}
.stats-card h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.week-grid .wg-day{font-size:9px;color:var(--muted);font-weight:600;padding:4px 0}
.week-grid .wg-cell{
  aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
}

.heatmap-row{display:flex;gap:3px;margin-bottom:8px;align-items:center}
.heatmap-label{font-size:10px;color:var(--muted);width:28px;flex-shrink:0;text-align:right;margin-right:4px}
.heatmap-cell{
  flex:1;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;color:var(--text);transition:all .2s;
}

.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--muted);width:70px;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--card);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:var(--bg)}

.big-number{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:800;line-height:1}
.big-label{font-size:11px;color:var(--muted);margin-top:2px}

/* === SETTINGS PAGE === */
.setting-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;margin-bottom:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
}
.setting-item .s-left{display:flex;align-items:center;gap:10px}
.setting-item .s-icon{font-size:18px}
.setting-item .s-text{font-size:13px;font-weight:500}
.setting-item .s-sub{font-size:11px;color:var(--muted)}
.danger-btn{
  padding:10px 20px;border:1px solid rgba(239,68,68,.3);border-radius:12px;
  background:rgba(239,68,68,.08);color:var(--red);
  font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;
  width:100%;margin-top:12px;
}
.toggle{
  width:44px;height:24px;border-radius:12px;padding:2px;cursor:pointer;
  background:var(--border);transition:all .2s;border:none;
}
.toggle.on{background:var(--accent)}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;transition:all .2s}
.toggle.on .toggle-knob{transform:translateX(20px)}

/* === INSTALL BANNER === */
.install-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:linear-gradient(135deg,var(--card),var(--surface));
  border-bottom:1px solid var(--accent)30;
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  animation:slideDown .4s ease;
}
.install-bar.hidden{display:none}
.install-bar .ib-text{flex:1;font-size:12px;font-weight:500}
.install-bar .ib-btn{
  padding:6px 16px;border:none;border-radius:8px;
  background:var(--accent);color:var(--bg);font-weight:700;font-size:12px;cursor:pointer;
  font-family:'Outfit',sans-serif;
}
.install-bar .ib-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>

// ========== STORAGE ==========
function getDateKey(d){return d.toISOString().split('T')[0]}
function loadData(){try{return JSON.parse(localStorage.getItem('grind_v2'))||{}}catch(e){return{}}}
function saveData(d){localStorage.setItem('grind_v2',JSON.stringify(d))}
function getCompleted(dateKey){const d=loadData();return d[dateKey]||[]}
function toggleTask(dateKey,taskId){
  const d=loadData();
  if(!d[dateKey])d[dateKey]=[];
  const idx=d[dateKey].indexOf(taskId);
  if(idx>-1)d[dateKey].splice(idx,1);else d[dateKey].push(taskId);
  saveData(d);
}
function getDayCompletion(dateKey,dayName){
  const tasks=S[dayName];
  if(!tasks)return 0;
  const done=getCompleted(dateKey);
  return done.filter(id=>tasks.some(t=>t.id===id)).length/tasks.length;
}

// ========== STREAK ==========
function calcStreak(){
  const data=loadData();
  let streak=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);
    d.setDate(d.getDate()-i);
    const key=getDateKey(d);
    const dayIdx=d.getDay();
    const dayName=DAYS[dayIdx===0?6:dayIdx-1];
    const tasks=S[dayName];
    if(!tasks)break;
    const done=(data[key]||[]).filter(id=>tasks.some(t=>t.id===id)).length;
    const pct=done/tasks.length;
    if(i===0&&pct<0.5)continue; // today in progress
    if(i>0&&pct<0.5)break;
    if(pct>=0.5)streak++;
  }
  return streak;
}

// ========== TIME UTILS ==========
function parseTime(s){const m=s.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 0;let h=+m[1],min=+m[2];if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return h*60+min}
function getCurrentIdx(tasks){const n=new Date(),nm=n.getHours()*60+n.getMinutes();let c=-1;for(let i=0;i<tasks.length;i++)if(parseTime(tasks[i].t)<=nm)c=i;return c}

function renderSchedule(){
  const dayName=DAYS[selDay];
  const allTasks=S[dayName];
  const tasks=filt?allTasks.filter(t=>t.y===filt):allTasks;
  const isToday=selDay===todayDayIdx;
  const curIdx=isToday?getCurrentIdx(allTasks):-1;
  const selDate=new Date(todayDate);
  selDate.setDate(selDate.getDate()+(selDay-todayDayIdx));
  const dateKey=getDateKey(selDate);
  const completed=getCompleted(dateKey);

  // Streak
  const streak=calcStreak();
  document.getElementById('streakBadge').innerHTML=`🔥 ${streak} day${streak!==1?'s':''} streak`;

  // Day chips
  let dc='';
  DSHORT.forEach((d,i)=>{
    const chipDate=new Date(todayDate);
    chipDate.setDate(chipDate.getDate()+(i-todayDayIdx));
    const dk=getDateKey(chipDate);
    const dn=DAYS[i];
    const comp=getDayCompletion(dk,dn);
    const dotColor=comp>=0.8?'#22C55E':comp>=0.4?'#F59E0B':'#EF4444';
    const hasData=(loadData()[dk]||[]).length>0;
    dc+=`<button class="day-chip ${i===selDay?'active':''} ${i===todayDayIdx?'today':''}" onclick="selDay=${i};filt=null;renderSchedule()">
      ${hasData?`<span class="check-dot" style="background:${dotColor}"></span>`:''}
      <span class="day-name">${d}</span>
      <span class="day-date">${chipDate.getDate()}/${chipDate.getMonth()+1}</span>
    </button>`;
  });
  document.getElementById('dayScroll').innerHTML=dc;

  // Progress ring
  const doneCount=completed.filter(id=>allTasks.some(t=>t.id===id)).length;
  const total=allTasks.length;
  const pct=Math.round((doneCount/total)*100);
  const r=26,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
  const gymDone=completed.filter(id=>allTasks.some(t=>t.id===id&&t.y==='gym')).length;
  const workDone=completed.filter(id=>allTasks.some(t=>t.id===id&&t.y==='work')).length;
  const gymTotal=allTasks.filter(t=>t.y==='gym').length;
  const workTotal=allTasks.filter(t=>t.y==='work').length;

  document.getElementById('progressRing').innerHTML=`
  <div class="progress-section">
    <div class="ring-wrap">
      <svg width="64" height="64"><circle cx="32" cy="32" r="${r}" fill="none" stroke="#1C2333" stroke-width="5"/>
      <circle cx="32" cy="32" r="${r}" fill="none" stroke="${pct>=80?'#22C55E':pct>=40?'#F59E0B':'#EF4444'}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .5s"/></svg>
      <div class="ring-text"><span class="ring-pct">${pct}%</span><span class="ring-label">Done</span></div>
    </div>
    <div class="progress-stats">
      <div class="mini-stat"><div class="ms-val" style="color:#22C55E">${doneCount}/${total}</div><div class="ms-lbl">Tasks</div></div>
      <div class="mini-stat"><div class="ms-val" style="color:#EF4444">${gymDone}/${gymTotal}</div><div class="ms-lbl">Gym</div></div>
      <div class="mini-stat"><div class="ms-val" style="color:#3B82F6">${workDone}/${workTotal}</div><div class="ms-lbl">YouTube</div></div>
      <div class="mini-stat"><div class="ms-val" style="color:#F59E0B">${total-doneCount}</div><div class="ms-lbl">Remaining</div></div>
    </div>
  </div>`;

  // Gym
  const g=GYM[dayName];
  document.getElementById('gymBadge').innerHTML=`
  <div class="gym-strip ${g?'on':'off'}">
    <span class="g-icon">${g?'💪':'😴'}</span>
    <span class="g-text ${g?'on':'off'}">${g||'Rest Day — Active Recovery'}</span>
  </div>`;

  // Filters
  let fb=`<button class="f-pill ${!filt?'on':''}" style="--fc:#44BBA4;--fbg:rgba(68,187,164,.1)" onclick="filt=null;renderSchedule()">All</button>`;
  Object.entries(TC).forEach(([k,v])=>{
    if(k==='sleep')return;
    fb+=`<button class="f-pill ${filt===k?'on':''}" style="--fc:${v.color};--fbg:${v.color}14" onclick="filt=filt==='${k}'?null:'${k}';renderSchedule()">${v.icon} ${v.label}</button>`;
  });
  document.getElementById('filters').innerHTML=fb;

  // Tasks
  let tl='';
  tasks.forEach((item,i)=>{
    const c=TC[item.y];
    const isDone=completed.includes(item.id);
    const isCur=isToday&&allTasks.indexOf(item)===curIdx;
    tl+=`<div class="task-item ${isDone?'done':''} ${isCur?'current-task':''}" style="animation-delay:${i*30}ms" onclick="toggleTask('${dateKey}','${item.id}');renderSchedule()" ${isCur&&!filt?'id="curTask"':''}>
      <div class="checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L19 7"/></svg></div>
      <div class="type-dot" style="background:${c.color}"></div>
      <div class="task-body">
        <div class="task-top">
          <span class="task-time" style="color:${c.color}">${item.t}</span>
          ${isCur?'<span class="now-tag">Now</span>':''}
          ${item.d?`<span class="task-dur">${item.d}</span>`:''}
        </div>
        <div class="task-name">${item.k}</div>
      </div>
    </div>`;
  });
  document.getElementById('taskList').innerHTML=tl;

  // scroll to current
  if(isToday&&!filt)setTimeout(()=>{const el=document.getElementById('curTask');if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},350);
}

// ========== RENDER STATS ==========
function renderStats(){
  const data=loadData();
  const streak=calcStreak();

  // Last 7 days completion
  let weekHtml='<div class="week-grid">';
  DSHORT.forEach(d=>{weekHtml+=`<div class="wg-day">${d}</div>`});
  for(let i=6;i>=0;i--){
    // Map to correct day starting from 6 days ago
  }
  // Actually build for this week Mon-Sun
  let weekPcts=[];
  for(let i=0;i<7;i++){
    const d=new Date(todayDate);
    d.setDate(d.getDate()+(i-todayDayIdx));
    const dk=getDateKey(d);
    const dn=DAYS[i];
    const tasks=S[dn];
    const done=(data[dk]||[]).filter(id=>tasks.some(t=>t.id===id)).length;
    const pct=Math.round(done/tasks.length*100);
    weekPcts.push(pct);
    const bg=pct>=80?'rgba(34,197,94,.2)':pct>=40?'rgba(245,158,11,.2)':pct>0?'rgba(239,68,68,.15)':'var(--card)';
    const col=pct>=80?'#22C55E':pct>=40?'#F59E0B':pct>0?'#EF4444':'var(--muted)';
    weekHtml+=`<div class="wg-cell" style="background:${bg};color:${col}">${pct}%</div>`;
  }
  weekHtml+='</div>';

  // Category breakdown for today
  const selDate=new Date(todayDate);
  const dateKey=getDateKey(selDate);
  const todayTasks=S[DAYS[todayDayIdx]];
  const todayDone=data[dateKey]||[];
  let catHtml='';
  Object.entries(TC).forEach(([k,v])=>{
    if(k==='sleep')return;
    const catTasks=todayTasks.filter(t=>t.y===k);
    const catDone=catTasks.filter(t=>todayDone.includes(t.id)).length;
    const pct=catTasks.length?Math.round(catDone/catTasks.length*100):0;
    catHtml+=`<div class="bar-row">
      <span class="bar-label">${v.icon} ${v.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${v.color}">${pct>15?pct+'%':''}</div></div>
    </div>`;
  });

  // Total completed all time
  let totalDone=0,totalPossible=0;
  Object.entries(data).forEach(([dk,arr])=>{
    totalDone+=arr.length;
  });
  // Avg completion
  const keys=Object.keys(data).filter(k=>data[k].length>0);
  let avgPct=0;
  if(keys.length){
    let sum=0;
    keys.forEach(k=>{
      const d=new Date(k+'T12:00:00');
      const di=d.getDay();
      const dn=DAYS[di===0?6:di-1];
      const tasks=S[dn];
      if(tasks)sum+=data[k].filter(id=>tasks.some(t=>t.id===id)).length/tasks.length*100;
    });
    avgPct=Math.round(sum/keys.length);
  }

  document.getElementById('statsContent').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="stats-card" style="text-align:center">
        <div class="big-number" style="color:#F59E0B">${streak}</div>
        <div class="big-label">🔥 Day Streak</div>
      </div>
      <div class="stats-card" style="text-align:center">
        <div class="big-number" style="color:#44BBA4">${avgPct}%</div>
        <div class="big-label">📈 Avg Completion</div>
      </div>
    </div>
    <div class="stats-card">
      <h3>📅 This Week</h3>
      ${weekHtml}
    </div>
    <div class="stats-card">
      <h3>📊 Today's Categories</h3>
      ${catHtml}
    </div>
    <div class="stats-card" style="text-align:center">
      <div class="big-number" style="color:#3B82F6">${totalDone}</div>
      <div class="big-label">Total Tasks Completed (All Time)</div>
    </div>
    <div class="stats-card">
      <h3>💡 Tips</h3>
      <p style="font-size:12px;color:var(--muted);line-height:1.6">
        Complete 80%+ tasks daily to keep your streak alive. The streak counter needs at least 50% completion to count a day. Tap any task to check it off — your progress is saved automatically.
      </p>
    </div>
  `;
}
